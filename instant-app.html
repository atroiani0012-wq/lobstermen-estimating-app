<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>UMA Estimating — Tasklet Instant App</title>
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
  :root {
    --bg: #0b1220;
    --bg-panel: #111a2e;
    --bg-panel-2: #162238;
    --border: #1f2d4a;
    --border-strong: #2a3d63;
    --text: #e6ecf5;
    --text-muted: #8a9ab4;
    --accent: #2f6feb;
    --accent-hover: #3d7cf5;
    --accent-soft: #1a3566;
    --success: #10b981;
    --success-soft: #0c2a22;
    --warn: #f59e0b;
    --warn-soft: #2a2010;
    --error: #ef4444;

  .progress { display: flex; flex-direction: column; gap: 10px; margin-top: 12px; }
  .progress .step {

  .progress .step.active { border-color: var(--accent); background: var(--accent-soft); }

  .live-log {

  .live-log .line { padding: 1px 0; }

  .spinner {

  @keyframes spin { to { transform: rotate(360deg); } }

  .downloads { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 8px; }
  .download-card {

  .download-card:hover { border-color: var(--border-strong); }
  .download-card .info .name { font-weight: 600; font-size: 14px; margin-bottom: 2px; }
  .download-card .info .desc { font-size: 12px; color: var(--text-muted); }
  .download-card .info .size { font-size: 11px; color: var(--text-muted); margin-top: 4px; }
  .download-card .download-btn {
    background: var(--accent); color: white;
    padding: 8px 14px; border-radius: 6px;
    font-size: 13px; font-weight: 500; border: none; cursor: pointer;

  .download-card .download-btn:hover { background: var(--accent-hover); }

  .alert {
    padding: 12px 14px; border-radius: 8px; margin: 12px 0;
    font-size: 13px; border: 1px solid;

  .alert.error { background: var(--error-soft); border-color: var(--error); color: #ffccd0; }
  .alert.warn  { background: var(--warn-soft);  border-color: var(--warn);  color: #fbe4a9; }
  .alert.info  { background: var(--accent-soft); border-color: var(--accent); color: #c2d5fa; }

  .summary-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-top: 8px; }
  .summary-stat {
    background: var(--bg-panel-2); border: 1px solid var(--border);
    border-radius: 8px; padding: 10px 12px;
  }
  .summary-stat .label {
    font-size: 11px; color: var(--text-muted);
    text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 4px;
  }
  .summary-stat .value { font-size: 18px; font-weight: 600; }

  details {
    background: var(--bg-panel-2); border: 1px solid var(--border);
    border-radius: 8px; padding: 10px 14px; margin-top: 14px;
  }
  details summary { cursor: pointer; color: var(--text-muted); font-size: 13px; }
  details pre {
    margin-top: 10px; font-size: 11px; color: var(--text-muted);
    max-height: 300px; overflow: auto; background: var(--bg);
    padding: 10px; border-radius: 6px; border: 1px solid var(--border);
  }

  @media (max-width: 720px) {
    .grid-2, .downloads, .summary-grid, .estimate-card, .drive-bar {
      grid-template-columns: 1fr;
    }
    .drive-bar { flex-direction: column; }
    .app { padding: 16px; }
  }
</style>

<body>
<div id="root"></div>

<script type="text/babel" data-presets="env,react">
const { useState, useRef, useEffect, useCallback, useMemo } = React;

/* ============================================================================
   Bridge — tolerates Tasklet-injected host methods and falls back to HTTP.

   We distinguish three operations:
     scanDrive(payload)    — return JSON tree of Drive folder
     runProcess(payload,   — POST /api/process → NDJSON stream of events.
                onEvent)     Each event is a small JSON object; the final
                             one is {type:"complete", result:...}.
============================================================================ */

const BRIDGE = (() => {
  const t = (typeof window !== "undefined" && window.tasklet) || null;
  return {
    mode: t ? "tasklet" : "http",
    async scanDrive(payload) {
      if (t?.scanDrive) return await t.scanDrive(payload);
      if (t?.call)      return await t.call("drive_scan", payload);
      const r = await fetch("/api/drive/scan", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(payload),
      });
      const text = await r.text();
      let json;
      try { json = JSON.parse(text); }
      catch { throw new Error(`scan returned non-JSON (${r.status}): ${text.slice(0,200)}`); }
      if (!r.ok && json.ok !== false) json.ok = false;
      return json;
    },
    async runProcess(payload, onEvent) {
      // Tasklet streaming hooks (speculative) — if none available, use fetch + NDJSON.
      if (t?.runProcessStreaming) return await t.runProcessStreaming(payload, onEvent);

      const r = await fetch("/api/process", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(payload),
      });
      if (!r.ok && r.headers.get("content-type")?.includes("json")) {
        const errJson = await r.json();
        throw new Error(errJson.error || `process failed with HTTP ${r.status}`);
      }
      if (!r.body) throw new Error("Streaming not supported in this browser.");

      const reader = r.body.getReader();
      const decoder = new TextDecoder();
      let buffer = "";
      let finalResult = null;
      for (;;) {
        const { value, done } = await reader.read();
        if (done) break;
        buffer += decoder.decode(value, { stream: true });
        let idx;
        while ((idx = buffer.indexOf("\n")) >= 0) {
          const line = buffer.slice(0, idx).trim();
          buffer = buffer.slice(idx + 1);
          if (!line) continue;
          let evt;
          try { evt = JSON.parse(line); } catch { continue; }
          onEvent?.(evt);
          if (evt.type === "complete") finalResult = evt.result;
          if (evt.type === "error") throw new Error(evt.error || "backend error");
        }
      }
      if (!finalResult) throw new Error("process stream ended without a 'complete' event.");
      return finalResult;
    },
  };
})();

/* ============================================================================
   Utilities
============================================================================ */
function fileToBase64(file) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = () => {
      const result = reader.result || "";
      const comma = result.indexOf(",");
      resolve(comma >= 0 ? result.slice(comma + 1) : result);
    };
    reader.onerror = () => reject(reader.error || new Error("read failed"));
    reader.readAsDataURL(file);
  });
}

function formatBytes(n) {
  if (!n || n < 0) return "0 B";
  if (n < 1024) return n + " B";
  if (n < 1024 * 1024) return (n / 1024).toFixed(1) + " KB";
  if (n < 1024 * 1024 * 1024) return (n / 1024 / 1024).toFixed(1) + " MB";
  return (n / 1024 / 1024 / 1024).toFixed(2) + " GB";
}

function formatTokens(n) {
  if (!n || n < 0) return "0";
  if (n < 1000) return String(n);
  if (n < 1_000_000) return (n / 1000).toFixed(0) + "K";
  return (n / 1_000_000).toFixed(2) + "M";
}

function formatUSD(n) {
  if (!n && n !== 0) return "—";
  return "$" + Number(n).toFixed(2);
}

function base64ToBlob(b64, mime) {
  const binary = atob(b64);
  const bytes = new Uint8Array(binary.length);
  for (let i = 0; i < binary.length; i++) bytes[i] = binary.charCodeAt(i);
  return new Blob([bytes], { type: mime });
}
function mimeFor(name) {
  const lower = name.toLowerCase();
  if (lower.endsWith(".xlsx")) return "application/vnd.openxmlformats-officedocument.spreadsheetml.sheet";
  if (lower.endsWith(".docx")) return "application/vnd.openxmlformats-officedocument.wordprocessingml.document";
  return "application/octet-stream";
}
function downloadBase64(name, b64) {
  const blob = base64ToBlob(b64, mimeFor(name));
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url; a.download = name;
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  setTimeout(() => URL.revokeObjectURL(url), 60_000);
}

const FILE_DESCRIPTIONS = {
  "01_Takeoff.xlsx":       "UMA-formatted quantity takeoff spreadsheet",
  "02_Project_Info.docx":  "Scope summary, testing, design, risks, equipment, vendors",
  "03_Vendor_RFQs.docx":   "Vendor request-for-quotes, one section per category",
  "04_Cost_Proposal.docx": "First-draft cost proposal with inclusions & exclusions",
};

/* ============================================================================
   App
============================================================================ */
function App() {
  const today = new Date();
  const defaultDue = new Date(today.getTime() + 7 * 86400000).toISOString().slice(0, 10);

  const [meta, setMeta] = useState({
    name: "", location: "", client: "",
    bid_due_date: defaultDue, scope_hint: "", notes: "",
  });
  const [manualNotes, setManualNotes] = useState("");

  // Input mode: direct drag-drop (small jobs) or Drive folder (bid packages).
  const [mode, setMode] = useState("drive");

  // Direct upload
  const [files, setFiles] = useState([]);
  const [dragActive, setDragActive] = useState(false);
  const fileInputRef = useRef(null);

  // Drive scan
  const [driveFolder, setDriveFolder] = useState("");
  const [scanning, setScanning] = useState(false);
  const [scanError, setScanError] = useState(null);
  const [scanResult, setScanResult] = useState(null); // {folder_name, files, counts, ...}
  const [selectedIds, setSelectedIds] = useState(() => new Set());

  // Processing
  const [running, setRunning] = useState(false);
  const [error, setError] = useState(null);
  const [events, setEvents] = useState([]);   // {ts, text, err}
  const [progress, setProgress] = useState(null); // {stage, fileIdx, fileTotal, batch, batchTotal, filename}
  const [result, setResult] = useState(null);

  // Derived: total size/tokens/cost of the current selection
  const selectionSummary = useMemo(() => {
    if (!scanResult) return { count: 0, bytes: 0, tokens: 0 };
    let count = 0, bytes = 0, tokens = 0;
    for (const f of scanResult.files) {
      if (selectedIds.has(f.id)) {
        count++; bytes += f.size_bytes || 0; tokens += f.est_tokens || 0;
      }
    }
    return { count, bytes, tokens };
  }, [scanResult, selectedIds]);

  const costPreview = useMemo(() => {
    const t = selectionSummary.tokens;
    const outputEst = Math.max(3000, 3000 * (Math.ceil(selectionSummary.count / 25) || 1));
    const inputCost = (t / 1_000_000) * 3.0;
    const outputCost = (outputEst / 1_000_000) * 15.0;
    return {
      inputTokens: t,
      outputTokens: outputEst,
      total: inputCost + outputCost,
    };
  }, [selectionSummary]);

  const overBudget = costPreview.total > 5;

  // Group scanned files by folder path for display
  const fileGroups = useMemo(() => {
    if (!scanResult) return [];
    const map = new Map();
    for (const f of scanResult.files) {
      const key = f.path || "(root)";
      if (!map.has(key)) map.set(key, []);
      map.get(key).push(f);
    }
    return Array.from(map.entries()).sort((a, b) => a[0].localeCompare(b[0]));
  }, [scanResult]);

  // --- input handlers ----------------------------------------------------
  const setField = useCallback((k, v) => setMeta((m) => ({ ...m, [k]: v })), []);

  const addFiles = useCallback((list) => {
    const incoming = Array.from(list || []);
    setFiles((prev) => {
      const next = [...prev];
      for (const f of incoming) {
        next.push({
          id: crypto.randomUUID ? crypto.randomUUID() : String(Math.random()),
          file: f, name: f.name, size: f.size,
        });
      }
      return next;
    });
  }, []);
  const removeFile = useCallback((id) => setFiles((p) => p.filter((f) => f.id !== id)), []);
  const onDrop = useCallback((e) => {
    e.preventDefault(); setDragActive(false);
    if (e.dataTransfer?.files?.length) addFiles(e.dataTransfer.files);
  }, [addFiles]);
  const onDragOver = useCallback((e) => { e.preventDefault(); setDragActive(true); }, []);
  const onDragLeave = useCallback((e) => { e.preventDefault(); setDragActive(false); }, []);

  // --- Drive scan --------------------------------------------------------
  const doScan = useCallback(async () => {
    setScanning(true); setScanError(null); setScanResult(null);
    setSelectedIds(new Set());
    try {
      const res = await BRIDGE.scanDrive({
        drive_folder: driveFolder.trim(),
        drive_recursive: true,
      });
      if (!res || res.ok === false) {
        throw new Error(res?.error || "scan failed");
      }
      setScanResult(res);
      // Default: select all supported files
      const defaults = new Set(res.files.filter((f) => f.kind === "supported").map((f) => f.id));
      setSelectedIds(defaults);
    } catch (e) {
      setScanError(e.message || String(e));
    } finally {
      setScanning(false);
    }
  }, [driveFolder]);

  const toggle = useCallback((id) => {
    setSelectedIds((prev) => {
      const next = new Set(prev);
      if (next.has(id)) next.delete(id); else next.add(id);
      return next;
    });
  }, []);
  const selectAllSupported = useCallback(() => {
    if (!scanResult) return;
    setSelectedIds(new Set(scanResult.files.filter((f) => f.kind === "supported").map((f) => f.id)));
  }, [scanResult]);
  const selectAll = useCallback(() => {
    if (!scanResult) return;
    setSelectedIds(new Set(scanResult.files.filter((f) => f.kind !== "skipped").map((f) => f.id)));
  }, [scanResult]);
  const deselectAll = useCallback(() => setSelectedIds(new Set()), []);

  const pushEvent = useCallback((text, err = false) => {
    setEvents((prev) => [...prev.slice(-200), { ts: Date.now(), text, err }]);
  }, []);

  // --- submit ------------------------------------------------------------
  const canSubmit = !running && !scanning && (
    (mode === "upload" && (files.length > 0 || manualNotes.trim() || meta.notes.trim())) ||
    (mode === "drive"  && scanResult && selectedIds.size > 0)
  );

  const submit = useCallback(async () => {
    setError(null); setResult(null); setEvents([]); setProgress(null);
    if (overBudget && mode === "drive") {
      const ok = window.confirm(
        `Estimated cost ~${formatUSD(costPreview.total)} exceeds the $5 warning. Proceed?`
      );
      if (!ok) return;
    }

    setRunning(true);
    try {
      const payload = {
        meta: {
          name: meta.name, location: meta.location, client: meta.client,
          bid_due_date: meta.bid_due_date, scope_hint: meta.scope_hint, notes: meta.notes,
        },
        manual_notes: manualNotes,
        files: [],
        drive_selection: [],
        override_caps: true, // user confirmed via the cost dialog; backend will still enforce per-file cap
      };

      if (mode === "upload") {
        for (const f of files) {
          pushEvent(`Reading ${f.name}…`);
          const b64 = await fileToBase64(f.file);
          payload.files.push({ name: f.name, data_base64: b64 });
        }
      } else {
        payload.drive_folder = driveFolder.trim();
        payload.drive_selection = scanResult.files.filter((f) => selectedIds.has(f.id));
      }

      await BRIDGE.runProcess(payload, (evt) => {
        switch (evt.type) {
          case "start":
            pushEvent("Backend started."); break;
          case "cap_enforced":
            if (evt.rejected?.length) {
              pushEvent(`Skipped ${evt.rejected.length} files due to caps`, true);
            }
            break;
          case "file_start":
            setProgress({
              stage: "stream", fileIdx: evt.index, fileTotal: evt.total,
              filename: evt.name, sizeBytes: evt.size_bytes,
            });
            pushEvent(`→ ${evt.index}/${evt.total}  ${evt.name}  (${formatBytes(evt.size_bytes)})`);
            break;
          case "file_done":
            pushEvent(`   ${evt.summary}`);
            break;
          case "file_error":
            pushEvent(`   ! error on ${evt.name}: ${evt.error}`, true);
            break;
          case "ingest_done":
            pushEvent(`Ingest complete — ${evt.ingested_count} files, ~${formatTokens(evt.est_input_tokens)} tokens`);
            setProgress({ stage: "claude_pre" });
            break;
          case "claude_start":
            setProgress({ stage: "claude", batch: 0, batchTotal: null });
            break;
          case "claude_batch_done":
            setProgress({ stage: "claude", batch: evt.batch, batchTotal: evt.total_batches });
            pushEvent(`Claude batch ${evt.batch}/${evt.total_batches} done`);
            break;
          case "claude_done":
            pushEvent(`Claude: ${evt.usage?.input_tokens || 0} in / ${evt.usage?.output_tokens || 0} out tokens`);
            setProgress({ stage: "outputs" });
            break;
          case "outputs_start":
            pushEvent("Generating deliverables…"); break;
          case "outputs_done":
            pushEvent("Deliverables ready."); break;
          case "complete":
            setResult(evt.result); setProgress({ stage: "done" }); break;
          case "error":
            pushEvent(`ERROR: ${evt.error}`, true); break;
        }
      });
    } catch (e) {
      setError(e.message || String(e));
    } finally {
      setRunning(false);
    }
  }, [mode, meta, manualNotes, files, scanResult, selectedIds, driveFolder, overBudget, costPreview, pushEvent]);

  const reset = useCallback(() => {
    setResult(null); setError(null); setProgress(null); setEvents([]);
  }, []);

  // ----- render helpers --------------------------------------------------
  const renderProgress = () => {
    if (!running && !result && !error) return null;
    const fileIdx = progress?.fileIdx || 0;
    const fileTotal = progress?.fileTotal || (mode === "drive" ? selectedIds.size : files.length);
    const pct = fileTotal > 0 ? Math.round((fileIdx / fileTotal) * 100) : 0;
    return (
      <div>
        {progress?.stage === "stream" && fileTotal > 0 && (
          <div>
            <div style={{ display: "flex", justifyContent: "space-between", fontSize: 12, color: "var(--text-muted)" }}>
              <span>Streaming {fileIdx} of {fileTotal}: {progress.filename}</span>
              <span>{pct}%</span>
            </div>
            <div className="progress-bar"><div className="fill" style={{ width: pct + "%" }} /></div>
          </div>
        )}
        {progress?.stage === "claude" && (
          <div style={{ fontSize: 13, color: "var(--text-muted)", marginTop: 8 }}>
            <span className="spinner" style={{ marginRight: 8 }} />
            Claude analyzing
            {progress.batchTotal && progress.batchTotal > 1
              ? ` — batch ${Math.max(progress.batch, 1)} of ${progress.batchTotal}` : "…"}
          </div>
        )}
        {progress?.stage === "claude_pre" && (
          <div style={{ fontSize: 13, color: "var(--text-muted)", marginTop: 8 }}>
            <span className="spinner" style={{ marginRight: 8 }} />
            Preparing Claude request…
          </div>
        )}
        {progress?.stage === "outputs" && (
          <div style={{ fontSize: 13, color: "var(--text-muted)", marginTop: 8 }}>
            <span className="spinner" style={{ marginRight: 8 }} />
            Generating deliverables…
          </div>
        )}
        {events.length > 0 && (
          <div className="live-log">
            {events.map((e, i) => (
              <div className={`line ${e.err ? "err" : ""}`} key={i}>{e.text}</div>
            ))}
          </div>
        )}
      </div>
    );
  };

  const renderResults = () => {
    if (!result) return null;
    const files = result.files || [];
    const analysis = result.analysis || {};
    const project = analysis.project || {};
    const usage = result.usage || {};
    const cost = result.cost || {};
    const timing = result.timing || {};
    const takeoff = analysis.takeoff_items || [];
    const testing = analysis.testing_requirements || [];
    const vendors = analysis.vendor_list || [];
    return (
      <>
        <div className="panel">
          <h2>Results</h2>
          <div className="subtitle">
            {project.name || "Analysis complete"} ·&nbsp;
            {project.location || "—"} · Scope: {project.scope_type || "—"} ·&nbsp;
            {result.batches && result.batches > 1 ? `${result.batches} batches` : "1 pass"}
          </div>
          <div className="summary-grid">
            <div className="summary-stat">
              <div className="label">Takeoff items</div><div className="value">{takeoff.length}</div>
            </div>
            <div className="summary-stat">
              <div className="label">Testing items</div><div className="value">{testing.length}</div>
            </div>
            <div className="summary-stat">
              <div className="label">Vendor categories</div><div className="value">{vendors.length}</div>
            </div>
            <div className="summary-stat">
              <div className="label">Cost</div><div className="value">{formatUSD(cost.total_cost_usd)}</div>
            </div>
          </div>
        </div>

        <div className="panel">
          <h2>Download deliverables</h2>
          <div className="subtitle">
            4 files · Claude {timing.claude_sec?.toFixed?.(1) ?? "?"}s · Total {timing.total_sec?.toFixed?.(1) ?? "?"}s ·
            &nbsp;{formatTokens(usage.input_tokens)} in / {formatTokens(usage.output_tokens)} out
          </div>
          <div className="downloads">
            {files.map((f) => (
              <div className="download-card" key={f.name}>
                <div className="info">
                  <div className="name">{f.name}</div>
                  <div className="desc">{FILE_DESCRIPTIONS[f.name] || ""}</div>
                  <div className="size">{formatBytes(f.size_bytes)}</div>
                </div>
                <button className="download-btn" onClick={() => downloadBase64(f.name, f.data_base64)}>
                  Download
                </button>
              </div>
            ))}
          </div>
          <div className="actions">
            <button className="btn ghost" onClick={reset}>Start new estimate</button>
          </div>
        </div>

        <details>
          <summary>Inspect raw analysis JSON</summary>
          <pre>{JSON.stringify(analysis, null, 2)}</pre>
        </details>
      </>
    );
  };

  const renderDriveTree = () => {
    if (!scanResult) return null;
    const c = scanResult.counts;
    return (
      <>
        <div className="scan-meta">
          <strong>{scanResult.folder_name || scanResult.folder_id}</strong> · {c.total} items ·&nbsp;
          <span style={{ color: "var(--success)" }}>{c.supported} supported</span>
          {c.cad > 0      && <>, <span style={{ color: "var(--warn)" }}>{c.cad} CAD</span></>}
          {c.media > 0    && <>, {c.media} media</>}
          {c.archive > 0  && <>, {c.archive} archive</>}
          {c.skipped > 0  && <>, <span style={{ color: "var(--error)" }}>{c.skipped} unsupported</span></>}
          &nbsp;· {formatBytes(scanResult.total_size_bytes)}
        </div>

        <div className="estimate-card">
          <div className="estimate-stat">
            <div className="label">Selected</div>
            <div className="value">{selectionSummary.count} files</div>
          </div>
          <div className="estimate-stat">
            <div className="label">Size</div>
            <div className="value">{formatBytes(selectionSummary.bytes)}</div>
          </div>
          <div className="estimate-stat">
            <div className="label">Est. tokens in</div>
            <div className="value">{formatTokens(selectionSummary.tokens)}</div>
          </div>
          <div className={"estimate-stat" + (overBudget ? " warn" : "")}>
            <div className="label">Est. cost</div>
            <div className="value">{formatUSD(costPreview.total)}</div>
          </div>
        </div>

        {overBudget && (
          <div className="alert warn" style={{ marginTop: 12 }}>
            Estimated cost exceeds $5. You'll be asked to confirm before processing starts.
          </div>
        )}

        <div className="file-tree">
          <div className="tree-toolbar">
            <span>{selectionSummary.count} / {c.total} selected</span>
            <div className="actions-inline">
              <button className="btn ghost sm" onClick={selectAllSupported}>Supported only</button>
              <button className="btn ghost sm" onClick={selectAll}>All non-skipped</button>
              <button className="btn ghost sm" onClick={deselectAll}>None</button>
            </div>
          </div>
          {fileGroups.map(([folder, entries]) => (
            <div key={folder}>
              <div className="tree-folder">{folder}</div>
              {entries.map((f) => {
                const disabled = f.kind === "skipped";
                return (
                  <label className="tree-file" key={f.id} style={{ opacity: disabled ? 0.55 : 1 }}>
                    <input
                      type="checkbox" checked={selectedIds.has(f.id)}
                      onChange={() => toggle(f.id)} disabled={disabled}
                    />
                    <span className={`kind-tag kind-${f.kind}`}>{f.kind}</span>
                    <span className="tree-name" title={f.mime_type}>{f.name}</span>
                    <span className="tree-size">{formatBytes(f.size_bytes)}</span>
                  </label>
                );
              })}
            </div>
          ))}
        </div>
      </>
    );
  };

  // ----- main render -----------------------------------------------------
  return (
    <div className="app">
      <div className="header">
        <div className="brand">
          <div className="brand-mark">UMA</div>
          <div className="brand-text">
            <h1>UMA Estimating</h1>
            <p>AI-assisted bid-package analyzer · geotechnical scopes</p>
          </div>
        </div>
        <div className={`status-pill ${BRIDGE.mode === "tasklet" ? "ok" : ""}`}>
          <span className="dot" />
          {BRIDGE.mode === "tasklet" ? "Tasklet bridge connected" : "HTTP backend"}
        </div>
      </div>

      {error && (
        <div className="alert error">
          <strong>Error:</strong> {error}
        </div>
      )}

      {!result && (
        <>
          <div className="panel">
            <h2>1. Project details</h2>
            <div className="subtitle">Metadata Claude will use to contextualize the analysis.</div>
            <div className="grid-2">
              <div className="field">
                <label>Project name</label>
                <input value={meta.name} onChange={(e) => setField("name", e.target.value)}
                  placeholder="e.g., Back Bay Micropile Underpinning" />
              </div>
              <div className="field">
                <label>Location (city, state)</label>
                <input value={meta.location} onChange={(e) => setField("location", e.target.value)}
                  placeholder="Boston, MA" />
              </div>
              <div className="field">
                <label>Client / GC</label>
                <input value={meta.client} onChange={(e) => setField("client", e.target.value)}
                  placeholder="Turner, Suffolk, Shawmut…" />
              </div>
              <div className="field">
                <label>Bid due date</label>
                <input type="date" value={meta.bid_due_date}
                  onChange={(e) => setField("bid_due_date", e.target.value)} />
              </div>
              <div className="field">
                <label>Expected scope (optional)</label>
                <select value={meta.scope_hint} onChange={(e) => setField("scope_hint", e.target.value)}>
                  <option value="">Let Claude detect</option>
                  <option>Micropile</option><option>Soil Nail</option>
                  <option>HDPR</option><option>Pre-drilling</option>
                  <option>Shotcrete</option><option>Soldier Pile</option>
                  <option>Mixed</option><option>Other</option>
                </select>
              </div>
              <div className="field">
                <label>Notes / assumptions / exclusions</label>
                <textarea rows={3} value={meta.notes}
                  onChange={(e) => setField("notes", e.target.value)}
                  placeholder="Anything you want Claude to factor in that isn't in the files." />
              </div>
            </div>
          </div>

          <div className="panel">
            <h2>2. Source files</h2>
            <div className="subtitle">
              For real bid packages (5-10 GB), use Google Drive — files stream through the backend.
              For quick jobs with a handful of small files, use direct upload.
            </div>

            <div className="tabs">
              <button className={`tab ${mode === "drive" ? "active" : ""}`} onClick={() => setMode("drive")}>
                Google Drive folder
              </button>
              <button className={`tab ${mode === "upload" ? "active" : ""}`} onClick={() => setMode("upload")}>
                Direct upload
              </button>
            </div>

            {mode === "drive" ? (
              <>
                <div className="drive-bar">
                  <input type="text" placeholder="Paste Drive folder URL or ID (e.g., https://drive.google.com/drive/folders/…)"
                    value={driveFolder} onChange={(e) => setDriveFolder(e.target.value)} />
                  <button className="btn secondary" onClick={doScan} disabled={!driveFolder.trim() || scanning}>
                    {scanning ? <><span className="spinner" style={{ marginRight: 6 }} />Scanning…</> : "Scan folder"}
                  </button>
                </div>
                {scanError && <div className="alert error" style={{ marginTop: 12 }}>{scanError}</div>}
                {renderDriveTree()}
              </>
            ) : (
              <>
                <div
                  className={`dropzone ${dragActive ? "drag" : ""}`}
                  onClick={() => fileInputRef.current?.click()}
                  onDrop={onDrop} onDragOver={onDragOver} onDragLeave={onDragLeave}
                >
                  <div className="big">Drop files here or click to browse</div>
                  <div className="small">
                    {files.length === 0
                      ? "PDF · DOCX · XLSX · CSV · PNG/JPG · TXT"
                      : `${files.length} file(s) selected · ${formatBytes(files.reduce((s, f) => s + f.size, 0))}`}
                  </div>
                  <input ref={fileInputRef} type="file" multiple style={{ display: "none" }}
                    onChange={(e) => { addFiles(e.target.files); e.target.value = ""; }} />
                </div>
                {files.length > 0 && (
                  <div className="files-list">
                    {files.map((f) => (
                      <div className="file-row" key={f.id}>
                        <span style={{ flex: 1, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>
                          {f.name}
                        </span>
                        <span className="meta">{formatBytes(f.size)}</span>
                        <button onClick={() => removeFile(f.id)} aria-label="remove">✕</button>
                      </div>
                    ))}
                  </div>
                )}
              </>
            )}
          </div>

          <div className="panel">
            <h2>3. Manual entries (items not in the files)</h2>
            <div className="subtitle">Quantities, rates, verbal confirmations — anything useful.</div>
            <textarea rows={5} value={manualNotes} onChange={(e) => setManualNotes(e.target.value)}
              placeholder={"e.g., Client verbally confirmed 42 piles at 80ft each\nor: Use $48/LF baseline for 9-5/8\" casing based on last Enbridge quote"}
              style={{
                width: "100%", background: "var(--bg-panel-2)", color: "var(--text)",
                border: "1px solid var(--border)", borderRadius: 8, padding: 12,
                fontFamily: "inherit", fontSize: 14,
              }} />
            <div className="actions">
              <div style={{ color: "var(--text-muted)", fontSize: 12 }}>
                {!canSubmit && !running &&
                  (mode === "drive" ? "Scan a Drive folder and select files to begin." : "Upload at least one file or add notes to begin.")}
              </div>
              <button className="btn" onClick={submit} disabled={!canSubmit}>
                {running ? "Processing…" : "Analyze & generate →"}
              </button>
            </div>
            {renderProgress()}
          </div>
        </>
      )}

      {renderResults()}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
