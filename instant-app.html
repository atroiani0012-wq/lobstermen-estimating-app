<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>UMA Estimating — Tasklet Instant App</title>
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
  :root {
    --bg: #0b1220;
    --bg-panel: #111a2e;
    --bg-panel-2: #162238;
    --border: #1f2d4a;
    --border-strong: #2a3d63;
    --text: #e6ecf5;
    --text-muted: #8a9ab4;
    --accent: #2f6feb;
    --accent-hover: #3d7cf5;
    --accent-soft: #1a3566;
    --success: #10b981;
    --success-soft: #0c2a22;
    --warn: #f59e0b;
    --warn-soft: #2a2010;
    --error: #ef4444;
    --error-soft: #2a1114;
    --uma-navy: #1E3A8A;
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0;
    padding: 0;
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Inter, Arial, sans-serif;
    font-size: 14px;
    line-height: 1.5;
    min-height: 100vh;
  }
  a { color: var(--accent); text-decoration: none; }
  a:hover { text-decoration: underline; }

  .app {
    max-width: 1100px;
    margin: 0 auto;
    padding: 24px 24px 64px;
  }

  .header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
    padding: 8px 0 24px;
    border-bottom: 1px solid var(--border);
    margin-bottom: 24px;
  }
  .brand {
    display: flex;
    align-items: center;
    gap: 14px;
  }
  .brand-mark {
    width: 40px;
    height: 40px;
    border-radius: 8px;
    background: linear-gradient(135deg, var(--uma-navy), var(--accent));
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: 700;
    letter-spacing: 0.5px;
    color: #fff;
    font-size: 14px;
  }
  .brand-text h1 {
    margin: 0;
    font-size: 18px;
    font-weight: 600;
    letter-spacing: -0.01em;
  }
  .brand-text p {
    margin: 2px 0 0;
    font-size: 12px;
    color: var(--text-muted);
  }
  .status-pill {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 6px 12px;
    border-radius: 999px;
    background: var(--bg-panel);
    border: 1px solid var(--border);
    font-size: 12px;
    color: var(--text-muted);
  }
  .status-pill .dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--text-muted);
  }
  .status-pill.ok .dot { background: var(--success); }
  .status-pill.warn .dot { background: var(--warn); }
  .status-pill.err .dot { background: var(--error); }

  .panel {
    background: var(--bg-panel);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 24px;
    margin-bottom: 20px;
  }
  .panel h2 {
    margin: 0 0 4px;
    font-size: 15px;
    font-weight: 600;
    letter-spacing: 0.02em;
    text-transform: uppercase;
    color: var(--text-muted);
  }
  .panel .subtitle {
    color: var(--text-muted);
    font-size: 13px;
    margin-bottom: 18px;
  }

  .grid-2 {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 14px;
  }
  .field {
    display: flex;
    flex-direction: column;
    gap: 6px;
  }
  .field label {
    font-size: 12px;
    color: var(--text-muted);
    letter-spacing: 0.02em;
  }
  .field input, .field select, .field textarea {
    background: var(--bg-panel-2);
    color: var(--text);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 12px;
    font-size: 14px;
    font-family: inherit;
    outline: none;
    transition: border-color .15s;
  }
  .field textarea { resize: vertical; min-height: 80px; }
  .field input:focus, .field select:focus, .field textarea:focus {
    border-color: var(--accent);
  }

  .dropzone {
    border: 2px dashed var(--border-strong);
    border-radius: 10px;
    padding: 32px 20px;
    text-align: center;
    cursor: pointer;
    background: var(--bg-panel-2);
    transition: border-color .15s, background .15s;
  }
  .dropzone.drag {
    border-color: var(--accent);
    background: var(--accent-soft);
  }
  .dropzone .big {
    font-size: 15px;
    color: var(--text);
    margin-bottom: 4px;
    font-weight: 500;
  }
  .dropzone .small {
    font-size: 12px;
    color: var(--text-muted);
  }

  .files-list {
    margin-top: 14px;
    display: flex;
    flex-direction: column;
    gap: 6px;
  }
  .files-list .file-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: var(--bg-panel-2);
    border: 1px solid var(--border);
    padding: 8px 12px;
    border-radius: 8px;
    font-size: 13px;
  }
  .files-list .file-row .meta {
    color: var(--text-muted);
    font-size: 12px;
    margin-right: 12px;
  }
  .files-list .file-row button {
    background: transparent;
    border: none;
    color: var(--text-muted);
    cursor: pointer;
    padding: 4px 6px;
    font-size: 14px;
  }
  .files-list .file-row button:hover { color: var(--error); }

  .btn {
    background: var(--accent);
    color: white;
    border: none;
    padding: 12px 20px;
    border-radius: 8px;
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    transition: background .15s, transform .05s;
    font-family: inherit;
  }
  .btn:hover { background: var(--accent-hover); }
  .btn:active { transform: translateY(1px); }
  .btn:disabled {
    background: var(--bg-panel-2);
    color: var(--text-muted);
    cursor: not-allowed;
    border: 1px solid var(--border);
  }
  .btn.secondary {
    background: var(--bg-panel-2);
    color: var(--text);
    border: 1px solid var(--border-strong);
  }
  .btn.secondary:hover { background: var(--bg-panel); }
  .btn.ghost {
    background: transparent;
    color: var(--text-muted);
    padding: 8px 12px;
    font-weight: 400;
    border: 1px solid var(--border);
  }
  .btn.ghost:hover { color: var(--text); border-color: var(--border-strong); }

  .actions {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-top: 18px;
    gap: 12px;
  }

  .progress {
    display: flex;
    flex-direction: column;
    gap: 10px;
    margin-top: 12px;
  }
  .progress .step {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 14px;
    background: var(--bg-panel-2);
    border: 1px solid var(--border);
    border-radius: 8px;
    font-size: 13px;
  }
  .progress .step.active {
    border-color: var(--accent);
    background: var(--accent-soft);
  }
  .progress .step.done {
    border-color: var(--success);
    background: var(--success-soft);
  }
  .progress .step .ico { width: 16px; text-align: center; }

  .spinner {
    width: 14px; height: 14px;
    border: 2px solid transparent;
    border-top-color: var(--accent);
    border-right-color: var(--accent);
    border-radius: 50%;
    display: inline-block;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .downloads {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    margin-top: 8px;
  }
  .download-card {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 16px;
    background: var(--bg-panel-2);
    border: 1px solid var(--border);
    border-radius: 10px;
    transition: border-color .15s, transform .05s;
  }
  .download-card:hover { border-color: var(--border-strong); }
  .download-card .info .name {
    font-weight: 600;
    font-size: 14px;
    margin-bottom: 2px;
  }
  .download-card .info .desc {
    font-size: 12px;
    color: var(--text-muted);
  }
  .download-card .info .size {
    font-size: 11px;
    color: var(--text-muted);
    margin-top: 4px;
  }
  .download-card .download-btn {
    background: var(--accent);
    color: white;
    padding: 8px 14px;
    border-radius: 6px;
    font-size: 13px;
    font-weight: 500;
    border: none;
    cursor: pointer;
  }
  .download-card .download-btn:hover { background: var(--accent-hover); }

  .alert {
    padding: 12px 14px;
    border-radius: 8px;
    margin: 12px 0;
    font-size: 13px;
    border: 1px solid;
  }
  .alert.error { background: var(--error-soft); border-color: var(--error); color: #ffccd0; }
  .alert.warn { background: var(--warn-soft); border-color: var(--warn); color: #fbe4a9; }
  .alert.info { background: var(--accent-soft); border-color: var(--accent); color: #c2d5fa; }

  .summary-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 10px;
    margin-top: 8px;
  }
  .summary-stat {
    background: var(--bg-panel-2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 12px;
  }
  .summary-stat .label {
    font-size: 11px;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.05em;
    margin-bottom: 4px;
  }
  .summary-stat .value {
    font-size: 18px;
    font-weight: 600;
    color: var(--text);
  }

  details {
    background: var(--bg-panel-2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 14px;
    margin-top: 14px;
  }
  details summary {
    cursor: pointer;
    color: var(--text-muted);
    font-size: 13px;
  }
  details pre {
    margin-top: 10px;
    font-size: 11px;
    color: var(--text-muted);
    max-height: 300px;
    overflow: auto;
    background: var(--bg);
    padding: 10px;
    border-radius: 6px;
    border: 1px solid var(--border);
  }

  @media (max-width: 720px) {
    .grid-2, .downloads, .summary-grid { grid-template-columns: 1fr; }
    .app { padding: 16px; }
  }
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel" data-presets="env,react">
const { useState, useRef, useEffect, useCallback, useMemo } = React;

/* ============================================================================
   Tasklet bridge — calls the backend pipeline.

   Tries multiple transports in order, so this app works whether Tasklet
   injects a host bridge (window.tasklet) or serves the companion Python
   server on the same origin.

   Expected backend response:
     { ok: true, files: [{name, size_bytes, data_base64}], analysis, timing,
       usage, model, ingest_summaries }
   or
     { ok: false, error: "...", traceback: "..." }
============================================================================ */
async function callBackend(payload) {
  // 1) Tasklet-injected host bridge (preferred when running inside Tasklet).
  const t = (typeof window !== "undefined" && window.tasklet) || null;
  if (t) {
    if (typeof t.runBackend === "function") {
      return await t.runBackend("process_bid", payload);
    }
    if (typeof t.runScript === "function") {
      return await t.runScript("backend/process_bid.py", payload);
    }
    if (typeof t.call === "function") {
      return await t.call("process_bid", payload);
    }
    if (typeof t.exec === "function") {
      return await t.exec({ script: "backend/process_bid.py", payload });
    }
  }

  // 2) HTTP fallback — companion Python server on the same origin.
  const resp = await fetch("/api/process", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify(payload),
  });
  const text = await resp.text();
  let json;
  try { json = JSON.parse(text); }
  catch { throw new Error(`Backend returned non-JSON (${resp.status}): ${text.slice(0, 300)}`); }
  if (!resp.ok && json.ok !== false) json.ok = false;
  return json;
}

/* ============================================================================
   Utilities
============================================================================ */
function fileToBase64(file) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = () => {
      const result = reader.result || "";
      const comma = result.indexOf(",");
      resolve(comma >= 0 ? result.slice(comma + 1) : result);
    };
    reader.onerror = () => reject(reader.error || new Error("read failed"));
    reader.readAsDataURL(file);
  });
}

function formatBytes(n) {
  if (!n || n < 0) return "0 B";
  if (n < 1024) return n + " B";
  if (n < 1024 * 1024) return (n / 1024).toFixed(1) + " KB";
  return (n / 1024 / 1024).toFixed(1) + " MB";
}

function base64ToBlob(b64, mime) {
  const binary = atob(b64);
  const bytes = new Uint8Array(binary.length);
  for (let i = 0; i < binary.length; i++) bytes[i] = binary.charCodeAt(i);
  return new Blob([bytes], { type: mime });
}

function mimeFor(name) {
  const lower = name.toLowerCase();
  if (lower.endsWith(".xlsx")) return "application/vnd.openxmlformats-officedocument.spreadsheetml.sheet";
  if (lower.endsWith(".docx")) return "application/vnd.openxmlformats-officedocument.wordprocessingml.document";
  return "application/octet-stream";
}

function downloadBase64(name, b64) {
  const blob = base64ToBlob(b64, mimeFor(name));
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  a.download = name;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  setTimeout(() => URL.revokeObjectURL(url), 60_000);
}

const FILE_DESCRIPTIONS = {
  "01_Takeoff.xlsx":      "UMA-formatted quantity takeoff spreadsheet",
  "02_Project_Info.docx": "Scope summary, testing, design, risks, equipment, vendors",
  "03_Vendor_RFQs.docx":  "Vendor request-for-quotes, one section per category",
  "04_Cost_Proposal.docx": "First-draft cost proposal with inclusions & exclusions",
};

/* ============================================================================
   App
============================================================================ */
function App() {
  // Project metadata
  const today = new Date();
  const defaultDue = new Date(today.getTime() + 7 * 86400000).toISOString().slice(0, 10);
  const [meta, setMeta] = useState({
    name: "",
    location: "",
    client: "",
    bid_due_date: defaultDue,
    scope_hint: "",
    notes: "",
  });
  const [manualNotes, setManualNotes] = useState("");

  // Files
  const [files, setFiles] = useState([]);     // {id, file, name, size}
  const [dragActive, setDragActive] = useState(false);
  const fileInputRef = useRef(null);

  // Processing state
  const [running, setRunning] = useState(false);
  const [step, setStep] = useState(null);     // 'encode' | 'send' | 'analyze' | 'generate' | 'done'
  const [error, setError] = useState(null);
  const [result, setResult] = useState(null);

  // Backend detection (for the status pill)
  const backendMode = useMemo(() => {
    const t = (typeof window !== "undefined" && window.tasklet) || null;
    if (t && (t.runBackend || t.runScript || t.call || t.exec)) return "tasklet";
    return "http";
  }, []);

  const setField = useCallback((k, v) => setMeta((m) => ({ ...m, [k]: v })), []);

  const addFiles = useCallback((list) => {
    const incoming = Array.from(list || []);
    setFiles((prev) => {
      const next = [...prev];
      for (const f of incoming) {
        next.push({
          id: crypto.randomUUID ? crypto.randomUUID() : String(Math.random()),
          file: f,
          name: f.name,
          size: f.size,
        });
      }
      return next;
    });
  }, []);

  const removeFile = useCallback((id) => {
    setFiles((prev) => prev.filter((f) => f.id !== id));
  }, []);

  const onDrop = useCallback((e) => {
    e.preventDefault();
    setDragActive(false);
    if (e.dataTransfer?.files?.length) addFiles(e.dataTransfer.files);
  }, [addFiles]);

  const onDragOver = useCallback((e) => {
    e.preventDefault();
    setDragActive(true);
  }, []);

  const onDragLeave = useCallback((e) => {
    e.preventDefault();
    setDragActive(false);
  }, []);

  const canSubmit = !running && (
    files.length > 0 ||
    manualNotes.trim().length > 0 ||
    meta.notes.trim().length > 0
  );

  const submit = useCallback(async () => {
    setError(null);
    setResult(null);
    setRunning(true);
    try {
      setStep("encode");
      const encoded = [];
      for (const f of files) {
        const data_base64 = await fileToBase64(f.file);
        encoded.push({ name: f.name, data_base64 });
      }

      setStep("send");
      const payload = {
        meta: {
          name: meta.name,
          location: meta.location,
          client: meta.client,
          bid_due_date: meta.bid_due_date,
          scope_hint: meta.scope_hint,
          notes: meta.notes,
        },
        manual_notes: manualNotes,
        files: encoded,
      };

      setStep("analyze");
      const res = await callBackend(payload);
      if (!res || res.ok === false) {
        throw new Error(res?.error || "Backend returned an error.");
      }
      setStep("generate");
      // brief delay for the UI to breathe after the request returns
      await new Promise((r) => setTimeout(r, 150));
      setStep("done");
      setResult(res);
    } catch (e) {
      setError(e?.message || String(e));
      setStep(null);
    } finally {
      setRunning(false);
    }
  }, [files, manualNotes, meta]);

  const reset = useCallback(() => {
    setResult(null);
    setError(null);
    setStep(null);
    setFiles([]);
  }, []);

  // ----- Render helpers --------------------------------------------------
  const renderProgress = () => {
    if (!running && !result && !error) return null;
    const steps = [
      { id: "encode",   label: "Reading files" },
      { id: "send",     label: "Uploading to backend" },
      { id: "analyze",  label: "Claude is analyzing the bid package" },
      { id: "generate", label: "Generating deliverables" },
    ];
    const currentIdx = steps.findIndex((s) => s.id === step);
    return (
      <div className="progress">
        {steps.map((s, i) => {
          let cls = "step";
          let ico = "○";
          const isDone = result ? true : (currentIdx > i);
          const isActive = running && currentIdx === i;
          if (isActive) { cls += " active"; ico = null; }
          if (isDone) { cls += " done"; ico = "✓"; }
          return (
            <div className={cls} key={s.id}>
              <span className="ico">
                {isActive ? <span className="spinner" /> : ico}
              </span>
              <span>{s.label}</span>
            </div>
          );
        })}
      </div>
    );
  };

  const renderResults = () => {
    if (!result) return null;
    const files = result.files || [];
    const analysis = result.analysis || {};
    const project = analysis.project || {};
    const usage = result.usage || {};
    const timing = result.timing || {};
    const takeoff = analysis.takeoff_items || [];
    const testing = analysis.testing_requirements || [];
    const vendors = analysis.vendor_list || [];
    return (
      <>
        <div className="panel">
          <h2>Results</h2>
          <div className="subtitle">
            {project.name || "Analysis complete"} ·&nbsp;
            {project.location || "—"} ·&nbsp;
            Scope: {project.scope_type || "—"}
          </div>
          <div className="summary-grid">
            <div className="summary-stat">
              <div className="label">Takeoff items</div>
              <div className="value">{takeoff.length}</div>
            </div>
            <div className="summary-stat">
              <div className="label">Testing items</div>
              <div className="value">{testing.length}</div>
            </div>
            <div className="summary-stat">
              <div className="label">Vendor categories</div>
              <div className="value">{vendors.length}</div>
            </div>
            <div className="summary-stat">
              <div className="label">Tokens in / out</div>
              <div className="value" style={{ fontSize: 13 }}>
                {usage.input_tokens || 0} / {usage.output_tokens || 0}
              </div>
            </div>
          </div>
        </div>

        <div className="panel">
          <h2>Download deliverables</h2>
          <div className="subtitle">
            4 files · Analysis done in {timing.claude_sec?.toFixed?.(1) ?? "?"}s · Total {timing.total_sec?.toFixed?.(1) ?? "?"}s
          </div>
          <div className="downloads">
            {files.map((f) => (
              <div className="download-card" key={f.name}>
                <div className="info">
                  <div className="name">{f.name}</div>
                  <div className="desc">{FILE_DESCRIPTIONS[f.name] || ""}</div>
                  <div className="size">{formatBytes(f.size_bytes)}</div>
                </div>
                <button
                  className="download-btn"
                  onClick={() => downloadBase64(f.name, f.data_base64)}
                >
                  Download
                </button>
              </div>
            ))}
          </div>
          <div className="actions">
            <button className="btn ghost" onClick={reset}>Start new estimate</button>
          </div>
        </div>

        <details>
          <summary>Inspect raw analysis JSON</summary>
          <pre>{JSON.stringify(analysis, null, 2)}</pre>
        </details>
      </>
    );
  };

  // ----- Main render -----------------------------------------------------
  return (
    <div className="app">
      <div className="header">
        <div className="brand">
          <div className="brand-mark">UMA</div>
          <div className="brand-text">
            <h1>UMA Estimating</h1>
            <p>AI-assisted bid-package analyzer · geotechnical scopes</p>
          </div>
        </div>
        <div className={`status-pill ${backendMode === "tasklet" ? "ok" : ""}`}>
          <span className="dot" />
          {backendMode === "tasklet" ? "Tasklet bridge connected" : "HTTP backend"}
        </div>
      </div>

      {error && (
        <div className="alert error">
          <strong>Error:</strong> {error}
        </div>
      )}

      {!result && (
        <>
          <div className="panel">
            <h2>1. Project details</h2>
            <div className="subtitle">Project metadata Claude will use to contextualize the analysis.</div>
            <div className="grid-2">
              <div className="field">
                <label>Project name</label>
                <input
                  value={meta.name}
                  onChange={(e) => setField("name", e.target.value)}
                  placeholder="e.g., Back Bay Micropile Underpinning"
                />
              </div>
              <div className="field">
                <label>Location (city, state)</label>
                <input
                  value={meta.location}
                  onChange={(e) => setField("location", e.target.value)}
                  placeholder="Boston, MA"
                />
              </div>
              <div className="field">
                <label>Client / GC</label>
                <input
                  value={meta.client}
                  onChange={(e) => setField("client", e.target.value)}
                  placeholder="Turner, Suffolk, Shawmut…"
                />
              </div>
              <div className="field">
                <label>Bid due date</label>
                <input
                  type="date"
                  value={meta.bid_due_date}
                  onChange={(e) => setField("bid_due_date", e.target.value)}
                />
              </div>
              <div className="field">
                <label>Expected scope (optional)</label>
                <select
                  value={meta.scope_hint}
                  onChange={(e) => setField("scope_hint", e.target.value)}
                >
                  <option value="">Let Claude detect</option>
                  <option>Micropile</option>
                  <option>Soil Nail</option>
                  <option>HDPR</option>
                  <option>Pre-drilling</option>
                  <option>Shotcrete</option>
                  <option>Soldier Pile</option>
                  <option>Mixed</option>
                  <option>Other</option>
                </select>
              </div>
              <div className="field">
                <label>Notes / assumptions / exclusions</label>
                <textarea
                  rows={3}
                  value={meta.notes}
                  onChange={(e) => setField("notes", e.target.value)}
                  placeholder="Anything you want Claude to factor in that isn't in the files."
                />
              </div>
            </div>
          </div>

          <div className="panel">
            <h2>2. Drop bid-package files</h2>
            <div className="subtitle">
              PDFs, drawings, specs, geotech reports, Excel, Word, photos. Up to ~50 MB per file.
            </div>
            <div
              className={`dropzone ${dragActive ? "drag" : ""}`}
              onClick={() => fileInputRef.current?.click()}
              onDrop={onDrop}
              onDragOver={onDragOver}
              onDragLeave={onDragLeave}
            >
              <div className="big">Drop files here or click to browse</div>
              <div className="small">
                {files.length === 0
                  ? "PDF · DOCX · XLSX · CSV · PNG/JPG · TXT"
                  : `${files.length} file(s) selected · ${formatBytes(files.reduce((s, f) => s + f.size, 0))}`}
              </div>
              <input
                ref={fileInputRef}
                type="file"
                multiple
                style={{ display: "none" }}
                onChange={(e) => { addFiles(e.target.files); e.target.value = ""; }}
              />
            </div>
            {files.length > 0 && (
              <div className="files-list">
                {files.map((f) => (
                  <div className="file-row" key={f.id}>
                    <span style={{ flex: 1, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>
                      {f.name}
                    </span>
                    <span className="meta">{formatBytes(f.size)}</span>
                    <button onClick={() => removeFile(f.id)} aria-label="remove">✕</button>
                  </div>
                ))}
              </div>
            )}
          </div>

          <div className="panel">
            <h2>3. Manual entries (items not in the files)</h2>
            <div className="subtitle">Quantities, rates, verbal confirmations — anything useful.</div>
            <textarea
              rows={5}
              value={manualNotes}
              onChange={(e) => setManualNotes(e.target.value)}
              placeholder={"e.g., Client verbally confirmed 42 piles at 80ft each\nor: Use $48/LF baseline for 9-5/8\" casing based on last Enbridge quote"}
              style={{
                width: "100%",
                background: "var(--bg-panel-2)",
                color: "var(--text)",
                border: "1px solid var(--border)",
                borderRadius: 8,
                padding: 12,
                fontFamily: "inherit",
                fontSize: 14,
              }}
            />
            <div className="actions">
              <div style={{ color: "var(--text-muted)", fontSize: 12 }}>
                {!canSubmit && !running && "Upload at least one file or add notes to begin."}
              </div>
              <button
                className="btn"
                onClick={submit}
                disabled={!canSubmit}
              >
                {running ? "Analyzing…" : "Analyze & generate →"}
              </button>
            </div>
            {renderProgress()}
          </div>
        </>
      )}

      {renderResults()}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
